<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Альбом</title>

  <link rel="icon" href="https://radika1.link/2025/11/30/favicon911cc525c4888794.jpeg" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <link rel="stylesheet" href="../../assets/css/romaalbum.css">

  <script src="../../assets/js/romaalbum/photoalbum/albumsData.js" defer></script>

  <script src="../../assets/js/romaalbum/reader.js" defer></script>

  <script src="../../assets/js/romaalbum/loadComponent.js" defer></script>

</head>
<body>
  <div id="header"></div>
  <div class="content container">
    <div class="row">
      <div class="con col-md-6 order-md-2">
        <div id="menu"></div>
        <div id="nav"></div>

        <!-- Карусель блоков (месяцы) -->
        <div id="blocks-carousel" class="carousel slide" data-bs-ride="false">
          <div class="carousel-inner"></div>
          <button class="carousel-control-prev" type="button" data-bs-target="#blocks-carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#blocks-carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>

        <!-- Карусель слайдов (оригиналы) -->
        <div id="slides-carousel" class="carousel slide" data-bs-ride="false" style="display: none;">
          <div class="carousel-inner"></div>
          <button class="carousel-control-prev" type="button" data-bs-target="#slides-carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#slides-carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>

        <div id="button" class="d-none"></div>

      </div>

      <div id="left" class="left_menu col-md-3 order-md-1 d-none d-md-block text-center"></div>

      <div id="right" class="left_menu col-md-3 order-md-3 d-none d-md-block text-center"></div>

    </div>
  </div>
  <div id="footer"></div>
</body>
</html>
